# Nixpacks config — Railway precisa de Python + Node.js

providers = ["python", "node"]

[phases.setup]
nixPkgs = ["python3", "nodejs_18", "npm"]

[phases.install]
cmds = ["pip install -r requirements.txt", "cd dashboard && npm install"]

[phases.build]
cmds = ["cd dashboard && npm run build"]

[start]
cmd = "python main.py"
